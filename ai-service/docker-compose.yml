# ── AI Service — docker-compose.yml ──────────────────────────────────────────
# Standalone compose for the AI service stack.
# Run: docker compose -f ai-service/docker-compose.yml up
# Or attach to root: use the root docker-compose.yml (AI section added separately)
#
# Services:
#   ai-service   → FastAPI AI engine (port 8006)
#   postgres-ai  → Dedicated PostgreSQL for AI data (port 5433 external)
#   neo4j        → Neo4j graph database (ports 7474, 7687)

services:
  # ──────────────────────────────────────────────────────────────────────────
  # AI Service (FastAPI)
  # ──────────────────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_service
    ports:
      - "8006:8006"
    environment:
      # PostgreSQL
      - POSTGRES_HOST=postgres-ai
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${AI_DB_USER:-ai_user}
      - POSTGRES_PASSWORD=${AI_DB_PASSWORD:-ai_password}
      - POSTGRES_DB=${AI_DB_NAME:-ai_db}

      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_password}

      # Product Service (for syncing product data to RAG)
      - PRODUCT_SERVICE_URL=${PRODUCT_SERVICE_URL:-http://product-service:8001}

      # OpenAI (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}

      # Model settings
      - LSTM_MODEL_PATH=/app/models/lstm_model.pth
      - LSTM_VOCAB_PATH=/app/models/product_vocab.json
      - FAISS_INDEX_PATH=/app/vectorstore/product.index
      - PRODUCTS_JSON_PATH=/app/vectorstore/products.json

      - DEBUG=${DEBUG:-false}
    volumes:
      - ./app:/app/app                          # hot-reload dev source
      - ./data:/app/data                        # mount data folder containing CSVs
      - ai_models:/app/models                   # persistent model weights
      - ai_vectorstore:/app/vectorstore         # persistent FAISS index
    depends_on:
      postgres-ai:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ai_network
      - ecommerce_network                       # communicate with product-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s                         # allow model loading
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL — AI dedicated (separate from main ecommerce postgres)
  # ──────────────────────────────────────────────────────────────────────────
  postgres-ai:
    image: postgres:15-alpine
    container_name: ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AI_DB_USER:-ai_user}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:-ai_password}
      POSTGRES_DB: ${AI_DB_NAME:-ai_db}
    ports:
      - "5433:5432"                             # external 5433 to avoid conflict
    volumes:
      - ai_pgdata:/var/lib/postgresql/data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_DB_USER:-ai_user} -d ${AI_DB_NAME:-ai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Neo4j — Knowledge Graph
  # ──────────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: ai_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"                             # Browser UI
      - "7687:7687"                             # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
      NEO4J_dbms_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 60s
      retries: 5

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ai_network:
    driver: bridge
    name: ai_network
  ecommerce_network:
    external: true                              # shared with main services
    name: ecommerce_network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  ai_pgdata:
    name: ai_pgdata
  ai_models:
    name: ai_models
  ai_vectorstore:
    name: ai_vectorstore
  neo4j_data:
    name: neo4j_data
  neo4j_logs:
    name: neo4j_logs
  neo4j_plugins:
    name: neo4j_plugins
